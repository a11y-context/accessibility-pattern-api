name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Run prebuild generators
        working-directory: website
        run: npm run prebuild

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Verify patterns.json is in sync with .md sources
        run: |
          if ! git diff --exit-code -- patterns/web/react/patterns.json patterns/web/react/component-gallery.md; then
            echo ""
            echo "::error::patterns.json or component-gallery.md is out of date with the .md sources."
            echo "::error::Run \`npm run prebuild\` in the website/ directory locally and commit the regenerated files."
            exit 1
          fi
